<!DOCTYPE html>
<html lang="en">
<head>
    
<style>
    body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .roulette-container { background: #161b22; padding: 30px; border-radius: 15px; border: 2px solid #ff4d4d; width: 90%; max-width: 800px; text-align: center; }
    .arena-card { background: #0d1117; border: 2px solid #30363d; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 45%; }
    .arena-card:hover { border-color: #58a6ff; transform: scale(1.02); }
    #arena-trigger { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
</style>

<div class="roulette-container">
    <h1 style="color: #ff4d4d;">THE ARENA</h1>
    <p>Battle Status: <span style="color: #ffa500;">ACTIVE</span></p>
    
    <!-- We need a button specifically for the Arena -->
    <button id="arena-trigger">INITIATE COMBAT</button>

    <div id="arena-display" style="margin-top: 20px;">
        <!-- Two events will appear here to "battle" -->
    </div>
</div>

<!-- Make sure the script is linked -->
<script src="script.js"></script>

</body>
</html>
