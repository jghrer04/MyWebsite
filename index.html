<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chronicle Roulette</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        nav { width: 100%; max-width: 600px; display: flex; justify-content: space-around; margin-bottom: 40px; }
        nav a { color: #58a6ff; text-decoration: none; font-weight: bold; padding: 10px; border: 1px solid #30363d; border-radius: 6px; }
        .roulette-container { text-align: center; background: #161b22; padding: 50px; border-radius: 20px; border: 2px solid #238636; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #238636; text-transform: uppercase; }
        #trigger-btn { background: #238636; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; margin-top: 20px; }
        #trigger-btn:hover { background: #2ea043; transform: scale(1.05); }
        #event-display { margin-top: 30px; border-top: 1px solid #30363d; padding-top: 20px; }
        .event-detail { color: #ffa500; font-family: monospace; font-size: 1rem; margin: 5px 0; }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="arena.html">Arena</a>
        <a href="ledger.html">Ledger</a>
    </nav>

    <div class="roulette-container">
        <h1>CHRONICLE ROULETTE</h1>
        <p>Press the trigger to pull an event from the stream of time.</p>
        
        <!-- This ID is the key -->
        <button id="trigger-btn">TEMPORAL TRIGGER</button>

        <div id="event-display">
            <!-- Events will appear here -->
        </div>
    </div>

    <!-- This must be the ONLY script tag, at the very bottom -->
    <script src="script.js"></script>
</body>
