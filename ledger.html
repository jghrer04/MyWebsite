<!DOCTYPE html>
<html>
<head>
    <title>Historical Ledger</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 40px; text-align: center; }
        .entry { background: #161b22; border-left: 4px solid #58a6ff; margin: 10px auto; padding: 15px; max-width: 500px; text-align: left; }
        a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Your Saved Timeline</h1>
    <div id="timeline-list"></div>
    <br>
    <a href="index.html">← Back to Roulette</a>

    <script>
        const list = document.getElementById('timeline-list');
        const saved = JSON.parse(localStorage.getItem('myTimeline')) || [];
        
        if(saved.length === 0) {
            list.innerHTML = "<p>No events saved yet. Go play the Roulette!</p>";
        } else {
            saved.forEach(event => {
                list.innerHTML += `<div class="entry"><strong>${event.title}</strong><br>${event.date}</div>`;
            });
        }
    <body>
      <script>
    const ledgerDisplay = document.getElementById('ledger-display');
    let savedEvents = JSON.parse(localStorage.getItem('myTimeline')) || [];

    if (savedEvents.length === 0) {
        ledgerDisplay.innerHTML = "<p style='color: #8b949e; text-align: center;'>Your timeline is empty. Go pull the trigger!</p>";
    } else {
        // THE MAGIC PART: Sort by year (Oldest to Newest)
        savedEvents.sort((a, b) => parseInt(a.year) - parseInt(b.year));

        ledgerDisplay.innerHTML = savedEvents.map(event => `
            <div style="border-left: 4px solid #238636; background: #161b22; margin: 15px 0; padding: 15px; border-radius: 0 8px 8px 0;">
                <span style="color: #ffa500; font-family: monospace; font-weight: bold;">${event.year}</span>
                <h3 style="color: white; margin: 5px 0;">${event.title}</h3>
                <p style="color: #8b949e; margin: 0; font-size: 0.9rem;">${event.description}</p>
            </div>
        `).join('');
    }
